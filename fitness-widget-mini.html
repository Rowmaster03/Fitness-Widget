<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=390px, initial-scale=1.0">
<title>Fitness Mini</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0A0A0F;
    --surface:  #111118;
    --border:   #1C1C28;
    --dim:      #6A6A7A;
    --label:    #9A9AAA;
    --text:     #E8E8EE;
    --steps-c:  #4F8EF7;
    --cal-c:    #F7714F;
    --active-c: #4FF78E;
    --streak-c: #FF9F2E;
  }

  html, body {
    width: 390px;
    height: 390px;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }

  .widget {
    width: 390px;
    height: 390px;
    background: var(--surface);
    border-radius: 28px;
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  /* Subtle top glow */
  .widget::before {
    content: '';
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 80px;
    background: radial-gradient(ellipse, #4F8EF722 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-left {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
  }
  .streak-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #FF9F2E18;
    border: 1px solid #FF9F2E33;
    border-radius: 99px;
    padding: 3px 8px 3px 6px;
  }
  .streak-flame { font-size: 13px; line-height: 1; }
  .streak-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--streak-c);
  }
  .streak-lbl {
    font-size: 9px;
    color: #FF9F2E88;
    letter-spacing: 0.05em;
  }

  /* ── Stats grid ── */
  .stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
    margin-top: 16px;
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Mini arc */
  .mini-arc {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }
  .arc-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 4;
  }
  .arc-fill {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .arc-fill.steps  { stroke: var(--steps-c);  filter: drop-shadow(0 0 4px #4F8EF766); }
  .arc-fill.cal    { stroke: var(--cal-c);    filter: drop-shadow(0 0 4px #F7714F66); }
  .arc-fill.active { stroke: var(--active-c); filter: drop-shadow(0 0 4px #4FF78E66); }

  .arc-center {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    dominant-baseline: middle;
    text-anchor: middle;
    fill: var(--text);
  }

  /* Stat info */
  .stat-info {
    flex: 1;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    margin-bottom: 3px;
  }
  .stat-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .stat-unit {
    font-size: 11px;
    font-weight: 400;
    color: var(--dim);
    margin-left: 3px;
  }

  /* Progress bar */
  .stat-bar-wrap {
    margin-top: 5px;
    height: 2px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }
  .stat-bar.steps  { background: var(--steps-c); }
  .stat-bar.cal    { background: var(--cal-c); }
  .stat-bar.active { background: var(--active-c); }

  /* ── Footer date ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }
  .footer-date {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.08em;
  }
  .footer-dots {
    display: flex;
    gap: 4px;
  }
  .footer-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border);
  }
  .footer-dot.hit { background: var(--streak-c); box-shadow: 0 0 4px #FF9F2E88; }
  .footer-dot.today { border: 1px solid var(--steps-c); }

</style>
</head>
<body>

<div class="widget">

  <!-- Header -->
  <div class="header">
    <div class="header-left">ACTIVITY</div>
    <div class="streak-badge">
      <span class="streak-flame">🔥</span>
      <span class="streak-num" id="streak-num">0</span>
      <span class="streak-lbl">day streak</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">

    <!-- Steps -->
    <div class="stat-row">
      <svg class="mini-arc" viewBox="0 0 52 52">
        <circle class="arc-track" cx="26" cy="26" r="20"/>
        <circle class="arc-fill steps" id="steps-arc" cx="26" cy="26" r="20"
          stroke-dasharray="125.7" stroke-dashoffset="125.7"
          transform="rotate(-90 26 26)"/>
        <text class="arc-center" x="26" y="26" id="steps-pct-arc" fill="#9A9AAA" font-size="9" font-family="DM Mono">0%</text>
      </svg>
      <div class="stat-info">
        <div class="stat-label">Steps</div>
        <div class="stat-value">
          <span id="steps-val">0</span><span class="stat-unit">steps</span>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar steps" id="steps-bar"></div>
        </div>
      </div>
    </div>

    <!-- Calories -->
    <div class="stat-row">
      <svg class="mini-arc" viewBox="0 0 52 52">
        <circle class="arc-track" cx="26" cy="26" r="20"/>
        <circle class="arc-fill cal" id="cal-arc" cx="26" cy="26" r="20"
          stroke-dasharray="125.7" stroke-dashoffset="125.7"
          transform="rotate(-90 26 26)"/>
        <text class="arc-center" x="26" y="26" id="cal-pct-arc" fill="#9A9AAA" font-size="9" font-family="DM Mono">0%</text>
      </svg>
      <div class="stat-info">
        <div class="stat-label">Calories</div>
        <div class="stat-value">
          <span id="cal-val">0</span><span class="stat-unit">kcal</span>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar cal" id="cal-bar"></div>
        </div>
      </div>
    </div>

    <!-- Active Minutes -->
    <div class="stat-row">
      <svg class="mini-arc" viewBox="0 0 52 52">
        <circle class="arc-track" cx="26" cy="26" r="20"/>
        <circle class="arc-fill active" id="active-arc" cx="26" cy="26" r="20"
          stroke-dasharray="125.7" stroke-dashoffset="125.7"
          transform="rotate(-90 26 26)"/>
        <text class="arc-center" x="26" y="26" id="active-pct-arc" fill="#9A9AAA" font-size="9" font-family="DM Mono">0%</text>
      </svg>
      <div class="stat-info">
        <div class="stat-label">Active Min</div>
        <div class="stat-value">
          <span id="active-val">0</span><span class="stat-unit">min</span>
        </div>
        <div class="stat-bar-wrap">
          <div class="stat-bar active" id="active-bar"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-date" id="footer-date"></div>
    <div class="footer-dots" id="footer-dots"></div>
  </div>

</div>

<script>
  const CIRC = 2 * Math.PI * 20; // 125.7

  const defaults = {
    steps: 0, stepsGoal: 10000,
    cal: 0,   calGoal: 500,
    active: 0, activeGoal: 30,
  };

  function todayKey() {
    return new Date().toISOString().slice(0,10);
  }
  function dateKey(daysAgo) {
    const d = new Date();
    d.setDate(d.getDate() - daysAgo);
    return d.toISOString().slice(0,10);
  }

  function init() {
    // Date
    const now = new Date();
    document.getElementById('footer-date').textContent =
      now.toLocaleDateString('en-CA', { weekday:'short', month:'short', day:'numeric' }).toUpperCase();

    // Load saved state
    let state = { ...defaults };
    let streakData = { count: 0, days: {} };

    try {
      const s = localStorage.getItem('fitness-widget');
      if (s) Object.assign(state, JSON.parse(s));
      const sd = localStorage.getItem('fitness-streak');
      if (sd) streakData = JSON.parse(sd);
    } catch(e) {}

    // URL params
    const p = new URLSearchParams(window.location.search);
    if (p.has('steps'))  state.steps  = parseInt(p.get('steps'))  || state.steps;
    if (p.has('cal'))    state.cal    = parseInt(p.get('cal'))    || state.cal;
    if (p.has('min'))    state.active = parseInt(p.get('min'))    || state.active;
    if (p.has('gsteps')) state.stepsGoal  = parseInt(p.get('gsteps'))  || state.stepsGoal;
    if (p.has('gcal'))   state.calGoal    = parseInt(p.get('gcal'))    || state.calGoal;
    if (p.has('gmin'))   state.activeGoal = parseInt(p.get('gmin'))    || state.activeGoal;

    // Streak
    document.getElementById('streak-num').textContent = streakData.count || 0;

    // Render stats
    setTimeout(() => {
      setStat('steps',  state.steps,  state.stepsGoal);
      setStat('cal',    state.cal,    state.calGoal);
      setStat('active', state.active, state.activeGoal);
      renderDots(streakData);
    }, 100);
  }

  function setStat(key, value, goal) {
    const pct = Math.min(value / goal, 1);
    const offset = CIRC * (1 - pct);
    const pctRounded = Math.round(pct * 100);

    // Number
    countUp(document.getElementById(key + '-val'), 0, value, 1000);

    // Arc
    document.getElementById(key + '-arc').style.strokeDashoffset = offset;
    document.getElementById(key + '-pct-arc').textContent = pctRounded + '%';

    // Bar
    setTimeout(() => {
      document.getElementById(key + '-bar').style.width = (pct * 100) + '%';
    }, 50);
  }

  function countUp(el, from, to, duration) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * ease).toLocaleString();
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function renderDots(streakData) {
    const container = document.getElementById('footer-dots');
    container.innerHTML = '';
    const today = todayKey();
    for (let i = 6; i >= 0; i--) {
      const key = dateKey(i);
      const dot = document.createElement('div');
      const isToday = key === today;
      const hit = !!streakData.days[key];
      dot.className = 'footer-dot' + (hit ? ' hit' : '') + (isToday && !hit ? ' today' : '');
      container.appendChild(dot);
    }
  }

  init();
</script>
</body>
</html>
